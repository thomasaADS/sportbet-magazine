<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="ring" x1="0" y1="0" x2="48" y2="48">
      <stop offset="0%" stop-color="#e8193a"/>
      <stop offset="100%" stop-color="#9e0c22"/>
    </linearGradient>
    <linearGradient id="gold" x1="11" y1="0" x2="37" y2="0">
      <stop offset="0%" stop-color="#c9a83e"/>
      <stop offset="100%" stop-color="#e8cc6a"/>
    </linearGradient>
  </defs>
  <!-- Outer red ring - the arena frame -->
  <rect x="1" y="1" width="46" height="46" rx="13" fill="url(#ring)"/>
  <!-- Inner dark arena surface -->
  <rect x="5" y="5" width="38" height="38" rx="9" fill="#1a1412"/>
  <!-- Bold stylized ה -->
  <rect x="11" y="12" width="26" height="5" rx="1" fill="white"/>
  <rect x="32" y="12" width="5" height="23" rx="1" fill="white"/>
  <rect x="15" y="21" width="5" height="14" rx="1" fill="white"/>
  <!-- Premium gold accent line -->
  <rect x="11" y="39" width="26" height="2" rx="1" fill="url(#gold)"/>
</svg>
